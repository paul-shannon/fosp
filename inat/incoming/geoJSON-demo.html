<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Simple Circle</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      let map;
      function initMap() {
         map = new google.maps.Map(document.getElementById("map"), {
         zoom: 10,
         center: {lat: 47.2277, lng: -122.3555},
         });
     map.data.loadGeoJson(
       //"https://storage.googleapis.com/mapsdevsite/json/google.json",
       "http://localhost:8001/waParksBoundaries.geojson"
      );}

window.initMap = initMap;

    </script>
    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDkGwPVB2OLaBmQjLQvkoLv5M1ZQU64V7A&callback=initMap">
    </script>
  </body>
</html>
