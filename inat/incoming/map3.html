<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
    <title>Map 3</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      $(document).ready(function(){
          //readFernData()
          //initMap()
         });

      function readFernData(){
         var reports;
         console.log("entering readFernData")
         $.getJSON( "fernReports.json", function(json) {
             reports = json
         })
       .done(function(){
          console.log("getJSON done")
           console.log("fern count: " + reports.length)
          return(reports)
          })
       .fail(function(){
          console.log("getJSON failure")
          })
       } // readFernData


      async function initMap() {
        let reports = await readFernData();
        console.log(reports)
        var map = new google.maps.Map(document.getElementById('map'), {
          zoom: 10,
            center: {lat: 47.2277, lng: -122.3555},
            mapTypeId: google.maps.MapTypeId.TERRAIN
          });

       const icon = {path: google.maps.SymbolPath.CIRCLE,
                     scale: 10,
                     fillOpacity: 1,
                     strokeWeight: 1,
                     fillColor: "brown", //calculateHealthColor(tree),
                     strokeColor: '#000',
                     }

       console.log("about to create " + reports.length + " fern markers")
       let marker = new google.maps.Marker({
           position: {lat:  47.53401, lng: -122.2946},
           map,
           title: "fubar",
           icon: icon
           })

      window.reports.forEach(function(report){
         // console.log(report)
         var size = 5; //tree["dbh"]/2;
         var lat = report["lat"]
         var lng = report["lon"]
         console.log("new report at " + lat + ", " + lng);
         let marker = new google.maps.Marker({
            position: {lat:  lat, lng: lng},
            map,
            title: "fern", // tree["id"].toString(),
            icon: icon
            })

          // cribbed from
          // ~/github/sewardParkRestoration/hemlockSurvey2024/maps/muweiAndEric/map-plubbable.js
       let infoWindow = new google.maps.InfoWindow({
           content: "<h4> fern observation</h4>"
             /******
             "<ul>" +
               "<li> dbh: " + tree["dbh"] +
               "<li> h1: " + tree["h1"] +
               "<li> h2: " + tree["h2"] +
               "<li> h3: " + tree["h3"] +
               "<li> lat: " + tree["lat"] +
               "<li> lon: " + tree["lon"] +
               "<li> overall health: " + tree["h"] +
               "<li> aspect: " + tree["aspect"] +
               "<li> slope: " + tree["slope"] + 
               "<li> date: " + tree["date"] + 
               "<li> location: " + tree["loc"] + 
               "</ul>" +
               tree["comments"]
               *********/
           })
       marker.addListener("click", () => {
          infoWindow.open({
             anchor: marker,
             map,
             });
          })


         })// forEach

      } // initMap

    </script>
    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDkGwPVB2OLaBmQjLQvkoLv5M1ZQU64V7A&callback=initMap">
    //src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDkGwPVB2OLaBmQjLQvkoLv5M1ZQU64V7A">
    </script>
  </body>
</html>
