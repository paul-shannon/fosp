<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
    <title>Fern Survey 2025</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var map;
      $(document).ready(function(){
          readFernData()
          //initMap()
         });

      function readFernData(){
         var reports;
         console.log("entering readFernData")
         $.getJSON( "fernReports.json", function(json) {
             window.reports = json
         })
       .done(function(){
          console.log("getJSON done")
          console.log("fern count: " + window.reports.length)
           map = initMap()
          })
       .fail(function(){
          console.log("getJSON failure")
          })
       } // readFernData


    //------------------------------------------------------------
    function createCountiesToggle(map) {
      const controlButton = document.createElement("button");
    
      // Set CSS for the control.
      controlButton.style.backgroundColor = "#fff";
      controlButton.style.border = "2px solid #fff";
      controlButton.style.borderRadius = "3px";
      controlButton.style.boxShadow = "0 2px 6px rgba(0,0,0,.3)";
      controlButton.style.color = "rgb(25,25,25)";
      controlButton.style.cursor = "pointer";
      controlButton.style.fontFamily = "Roboto,Arial,sans-serif";
      controlButton.style.fontSize = "16px";
      controlButton.style.lineHeight = "38px";
      controlButton.style.margin = "8px 0 22px";
      controlButton.style.padding = "0 5px";
      controlButton.style.textAlign = "center";
      controlButton.textContent = "Toggle Counties";
      controlButton.type = "button";
      controlButton.addEventListener("click", () => {
          if(countyLayer.getMap(map) == null){
             countyLayer.setMap(map);
             }
          else {
             countyLayer.setMap(null)
             }
      });
      return controlButton;
      }
    //------------------------------------------------------------
    function createDNRToggle(map) {
      const controlButton = document.createElement("button");
    
      // Set CSS for the control.
      controlButton.style.backgroundColor = "#fff";
      controlButton.style.border = "2px solid #fff";
      controlButton.style.borderRadius = "3px";
      controlButton.style.boxShadow = "0 2px 6px rgba(0,0,0,.3)";
      controlButton.style.color = "rgb(25,25,25)";
      controlButton.style.cursor = "pointer";
      controlButton.style.fontFamily = "Roboto,Arial,sans-serif";
      controlButton.style.fontSize = "16px";
      controlButton.style.lineHeight = "38px";
      controlButton.style.margin = "8px 0 22px";
      controlButton.style.padding = "0 5px";
      controlButton.style.textAlign = "center";
      controlButton.textContent = "Toggle DNR";
      controlButton.type = "button";
      controlButton.addEventListener("click", () => {
          if(dnrLayer.getMap(map) == null){
             dnrLayer.setMap(map);
             }
          else {
             dnrLayer.setMap(null)
             }
      });
      return controlButton;
      }
    //------------------------------------------------------------
    function createStateParksToggle(map) {
      const controlButton = document.createElement("button");
    
      // Set CSS for the control.
      controlButton.style.backgroundColor = "#fff";
      controlButton.style.border = "2px solid #fff";
      controlButton.style.borderRadius = "3px";
      controlButton.style.boxShadow = "0 2px 6px rgba(0,0,0,.3)";
      controlButton.style.color = "rgb(25,25,25)";
      controlButton.style.cursor = "pointer";
      controlButton.style.fontFamily = "Roboto,Arial,sans-serif";
      controlButton.style.fontSize = "16px";
      controlButton.style.lineHeight = "38px";
      controlButton.style.margin = "8px 0 22px";
      controlButton.style.padding = "0 5px";
      controlButton.style.textAlign = "center";
      controlButton.textContent = "Toggle State parks";
      controlButton.type = "button";
      controlButton.addEventListener("click", () => {
          console.log("parks toggle")
          if(parksLayer.getMap(map) == null){
             parksLayer.setMap(map);
             }
          else {
             parksLayer.setMap(null)
             }
      });
      return controlButton;
      }
    //------------------------------------------------------------

      async function initMap() {
        const {Map} = await google.maps.importLibrary("maps");
        //const {AdvancedMarkerElement} = await google.maps.importLibrary("marker");

        console.log(window.reports)
        var map = new google.maps.Map(document.getElementById('map'), {
          zoom: 7,
            center: {lat: 47.2277, lng: -122.3555},
            mapTypeId: google.maps.MapTypeId.TERRAIN
          });

       window.map = map
       const icon = {path: google.maps.SymbolPath.CIRCLE,
                     scale: 10,
                     fillOpacity: 1,
                     strokeWeight: 1,
                     fillColor: "brown", //calculateHealthColor(tree),
                     strokeColor: '#000',
                     }

       console.log("about to create " + window.reports.length + " fern markers")
       var countyLayer = new google.maps.Data()
       //let jsonFile1 = "https://pshannon.net/fernSurvey2025/WA_County_Boundaries.geojson"
       let jsonFile1 = "WA_County_Boundaries.geojson"
       countyLayer.loadGeoJson(jsonFile1)
       window.countyLayer = countyLayer;          
       countyLayer.setMap(map);
      
       var parksLayer = new google.maps.Data()
       //let jsonFile2 = "https://pshannon.net/fernSurvey2025/waParksBoundaries.geojson"
       let jsonFile2 = "waParksBoundaries.geojson"
       //let jsonFile2 = "https://pshannon.net/fernSurvey2025/parksSmall.geojson"
       //let jsonFile2 = "parksSmall.geojson"
       parksLayer.loadGeoJson(jsonFile2)
       parksLayer.setMap(map);
       window.parksLayer = parksLayer;
  

      var dnrLayer  = new google.maps.Data();
      //let jsonFile3 = "https://pshannon.net/fernSurvey2025/WA_DNR_Managed_Land_Parcels.geojson"
      let jsonFile3 = "WA_DNR_Managed_Land_Parcels.geojson"
       //   map.data.loadGeoJson(jsonFile3)
      dnrLayer.loadGeoJson(jsonFile3)
      dnrLayer.setMap(map);
      window.dnrLayer = dnrLayer
     

      // let marker = new google.maps.marker.AdvancedMarkerElement({
      let marker = new google.maps.Marker({
           position: {lat:  47.53401, lng: -122.2946},
           map,
           title: "fubar",
           icon: icon
           })

      window.reports.forEach(function(report){
         // console.log(report)
         var size = 5; //tree["dbh"]/2;
         var lat = report["lat"]
         var lng = report["lon"]
         //console.log("new report at " + lat + ", " + lng);
         let marker = new google.maps.Marker({
            position: {lat:  lat, lng: lng},
            map,
            title: "fern", // tree["id"].toString(),
            icon: icon
            })

          // cribbed from
          // ~/github/sewardParkRestoration/hemlockSurvey2024/maps/muweiAndEric/map-plubbable.js
       let infoWindow = new google.maps.InfoWindow({
           content: "<h4> fern observation</h4>" +
             "<ul>" +
               "<li> by: " + report["user"] +
               "<li> date: " + report["date"] +
               "</ul>" +
               "<p>" + 
               report["description"] +
               "<img src='" + report["url"] + "'>"
             /******
             "<ul>" +
               "<li> dbh: " + tree["dbh"] +
               "<li> h1: " + tree["h1"] +
               "<li> h2: " + tree["h2"] +
               "<li> h3: " + tree["h3"] +
               "<li> lat: " + tree["lat"] +
               "<li> lon: " + tree["lon"] +
               "<li> overall health: " + tree["h"] +
               "<li> aspect: " + tree["aspect"] +
               "<li> slope: " + tree["slope"] + 
               "<li> date: " + tree["date"] + 
               "<li> location: " + tree["loc"] + 
               "</ul>" +
               tree["comments"]
               *********/
           })
       marker.addListener("click", () => {
          infoWindow.open({
             anchor: marker,
             map,
             });
          })


         })// forEach

        const centerControlDiv = document.createElement("div");
        const countiesToggleButton = createCountiesToggle(map);
        const dnrToggleButton = createDNRToggle(map);
        const parksToggleButton = createStateParksToggle(map);
        centerControlDiv.appendChild(countiesToggleButton)
        centerControlDiv.appendChild(dnrToggleButton)
        centerControlDiv.appendChild(parksToggleButton)
        map.controls[google.maps.ControlPosition.TOP_CENTER].push(centerControlDiv);
      } // initMap

    </script>

    </script>
  </body>
</html>
