<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>Simple Circle</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      function initMap() {
        var map = new google.maps.Map(document.getElementById('map'), {
          zoom: 10,
            center: {lat: 47.2277, lng: -122.3555},
            mapTypeId: google.maps.MapTypeId.TERRAIN
          });

       const icon = {path: google.maps.SymbolPath.CIRCLE,
                     scale: 10,
                     fillOpacity: 1,
                     strokeWeight: 1,
                     fillColor: "brown", //calculateHealthColor(tree),
                     strokeColor: '#000',
                     }

       let marker = new google.maps.Marker({
           position: {lat:  47.53401, lng: -122.2946},
           map,
           title: "fubar",
           icon: icon
           })
      } // initMap

    </script>
    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDkGwPVB2OLaBmQjLQvkoLv5M1ZQU64V7A&callback=initMap">
    </script>
  </body>
</html>
